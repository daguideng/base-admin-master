<script>

                    "text_analysis_increase": rs.data.result.text_analysis_increase,
                    "text_named_entity_increase": rs.data.result.text_named_entity_increase,
                    "visible_img_img_classfication": rs.data.result.visible_img_img_classfication,
                    "visible_img_target_detection": rs.data.result.visible_img_target_detection,

<script th:inline="none">

        table.render({

                {fixed: 'right', title:'操作', toolbar: '#barDemo'} // 操作列
            ]]
        });

        // 监听头部工具栏事件
        table.on('toolbar(model_table)', function(obj){
            var checkStatus = table.checkStatus(obj.config.id);
            switch(obj.event){
                case 'getCheckData':
                    var data = checkStatus.data;
                    layer.alert(JSON.stringify(data));
                    break;
                case 'getCheckLength':
                    var data = checkStatus.data;
                    layer.msg('选中了：'+ data.length + ' 个');
                    break;
                case 'isAll':
                    layer.msg(checkStatus.isAll ? '全选': '未全选');
                    break;
                case 'LAYTABLE_TIPS':
                    layer.alert('这是工具栏右侧自定义的一个图标按钮');
                    break;
            }
        });

        // 监听表格内操作按钮事件
        table.on('tool(model_table)', function(obj){
            var data = obj.data;
            if(obj.event === 'del'){
                layer.confirm('真的删除行么', function(index){
                    obj.del();
                    layer.close(index);
                });
            } else if(obj.event === 'edit'){
                layer.prompt({
                    formType: 2,
                    value: data.model_name
                }, function(value, index){
                    obj.update({
                        model_name: value // 注意这里应该是 model_name 而不是 name
                    });
                    layer.close(index);
                });
            } else if(obj.event === 'add'){
                // 添加操作的代码，可以根据需求进行具体实现
              //  console.log("Add operation clicked");
                var formHtml = `
        <form class="layui-form" id="addForm" style="padding: 20px;">
            <div class="layui-form-item">

                <div class="layui-input-block">
                    <input type="text" name="version" required lay-verify="required" placeholder="请输入版本号" autocomplete="off" class="layui-input">

            <div class="layui-form-item">
                <label class="layui-form-label">算法名称：</label>
                <div class="layui-input-block">
                    <input type="text" name="algorithm" required lay-verify="required" placeholder="请输入算法名称" autocomplete="off" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">分类：</label>
                <div class="layui-input-block">
                    <input type="text" name="category" required lay-verify="required" placeholder="请输入分类" autocomplete="off" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-input-block">
                    <button class="layui-btn" lay-submit lay-filter="submitForm">提交</button>
                    <button type="button" class="layui-btn layui-btn-primary" onclick="layer.closeAll();">取消</button>
                </div>
            </div>
        </form>
    `;

    layer.open({
        type: 1,
        title: '添加内容',
        content: formHtml,
        btn: false, // 不显示默认按钮
        shadeClose: true, // 点击遮罩关闭弹窗
        closeBtn: 0, // 不显示关闭按钮
        success: function(layero, index) {
            layui.form.render(); // 重新渲染表单，使表单元素生效
        }
    });

    // 监听提交按钮
    layui.form.on('submit(submitForm)', function(data){
        var addData = data.field;
        table.reload('model_table', {
            url: '/baseadmin/oneclick/addtest',
            method: 'post',
            contentType: 'application/json',
            where: addData,
            done: function(res, curr, count){
                layer.msg('添加成功');
            }
        });
        layer.closeAll();
        return false;
    });



}
        });

                data = obj.data, // 所在行所有键值
                field = obj.field; // 字段名
            layer.msg('修改成功: ID ['+ data.id +'] ' + field + ' 字段更改为：'+ value);
        });
    });
</script>
