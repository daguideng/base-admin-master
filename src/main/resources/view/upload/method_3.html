<body>
<form class="layui-form" action="">
    <div class="layui-tab layui-tab-brief" lay-filter="test1">

        <ul class="layui-tab-title">
            <li class="layui-this" lay-id="111">算法上传</li>
            <li lay-id="222">数据集上传</li>
        </ul>


        <div class="layui-tab-content">
            <div class="layui-tab-item layui-show">


                <!--弹出进度条-->

                         style="margin: 20px 10px;">
                        <div class="layui-progress-bar layui-bg-blue" lay-percent="0%"></div>
                    </div>
                </div>



                <div class="layui-card">

                                <form class="layui-form" style="margin: 0 auto;max-width: 460px;padding-top: 40px;">
                                    <div class="layui-form-item">

                                        </div>
                                    </div>
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">密码:</label>
                                        <div class="layui-input-block">
                                            <input type="text" placeholder="请填写密码" class="layui-input" required=""
                                                   id="password" lay-verify="required">
                                        </div>
                                    </div>


                                    <div class="layui-form-item">
                                    <div class="layui-inline">
                                        <label class="layui-form-label">后端api:</label>
                                        <div class="layui-input-inline">
                                            <select name="api" lay-verify="required"  lay-search="" id="api">
                                                <option value="">请选择API</option>
                                                <option value="http://10.10.12.13:5000">http://10.10.12.13:5000</option>
                                                <option value="http://10.10.12.13:5000">http://10.10.12.13:5000</option>
                                            </select>
                                        </div>
                                    </div>

                                    </div>
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">图像分类:</label>
                                        <div class="layui-input-block">
                                            <div class="layui-btn-container">
                                                <button type="button" class="layui-btn layui-btn-normal"
                                                        id="uploadDemoChoose">选择文件
                                                </button>
                                                <button type="button" class="layui-btn" id="uploadvideo">开始上传</button>
                                            </div>
                                        </div>
                                        <div class="layui-form-item">
                                            <label class="layui-form-label">重命名图像:</label>
                                            <div class="layui-input-block">
                                                <input type="text" placeholder="请重命名图像分类前缀" class="layui-input"
                                                       required="" id="reImgClassficationName">
                                            </div>
                                        </div>
                                    </div>


                                    <div class="layui-form-item">
                                        <label class="layui-form-label">目标检测:</label>
                                        <div class="layui-input-block">
                                            <div class="layui-btn-container">
                                                <button type="button" class="layui-btn layui-btn-normal"
                                                        id="choose-detection">选择文件
                                                </button>
                                                <button type="button" class="layui-btn" id="upload-detection">开始上传
                                                </button>
                                            </div>
                                        </div>
                                        <div class="layui-form-item">
                                            <label class="layui-form-label">重命名检测:</label>
                                            <div class="layui-input-block">
                                                <input type="text" placeholder="请重命名目标检测前缀" class="layui-input"

                                            </div>
                                        </div>
                                    </div>

                                    <div class="layui-form-item" >
                                        <label class="layui-form-label">文本-情感:</label>
                                        <div class="layui-input-block">
                                            <div class="layui-btn-container">
                                                <button type="button" class="layui-btn layui-btn-normal"
                                                        id="choose-chineseattack">选择文件
                                                </button>
                                                <button type="button" class="layui-btn" id="upload-chineseattack">
                                                    开始上传
                                                </button>
                                            </div>
                                        </div>
                                        <div class="layui-form-item">
                                            <label class="layui-form-label">重命名文本-情感:</label>
                                            <div class="layui-input-block">
                                                <input type="text" placeholder="请重命名文本前缀" class="layui-input"
                                                       required="" id="reChinese_attackName">
                                            </div>
                                        </div>
                                    </div>


                                    <div class="layui-form-item" >
                                        <label class="layui-form-label">文本-识别:</label>
                                        <div class="layui-input-block">
                                            <div class="layui-btn-container">
                                                <button type="button" class="layui-btn layui-btn-normal"
                                                        id="choose-seqattack">选择文件
                                                </button>
                                                <button type="button" class="layui-btn" id="upload-seqattack">
                                                    开始上传
                                                </button>
                                            </div>
                                        </div>
                                        <div class="layui-form-item">
                                            <label class="layui-form-label">重命名文本-识别:</label>
                                            <div class="layui-input-block">
                                                <input type="text" placeholder="请重命名文本前缀" class="layui-input"
                                                       required="" id="reSeq_AttackName">
                                            </div>
                                        </div>
                                    </div>


                                    <div class="layui-form-item">
                                        <label class="layui-form-label">语音:</label>
                                        <div class="layui-input-block">
                                            <div class="layui-btn-container">
                                                <button type="button" class="layui-btn layui-btn-normal"
                                                        id="choose-voice">选择文件
                                                </button>
                                                <button type="button" class="layui-btn" id="upload-voice">
                                                    开始上传
                                                </button>
                                            </div>
                                        </div>
                                        <div class="layui-form-item">
                                            <label class="layui-form-label">重命名语音:</label>
                                            <div class="layui-input-block">
                                                <input type="text" placeholder="请重命名语音前缀" class="layui-input"
                                                       required="" id="reVoiceName">
                                            </div>
                                        </div>
                                    </div>


                                    <div class="layui-form-item">
                                        <label class="layui-form-label">目标跟踪:</label>
                                        <div class="layui-input-block">
                                            <div class="layui-btn-container">
                                                <button type="button" class="layui-btn layui-btn-normal"
                                                        id="choose-trackdown">选择文件
                                                </button>

                                            </div>
                                        </div>

                            </div>

                        </div>

            <!--  数据集上传   -->

                </div>

<body>


<script src="https://cdn.staticfile.org/layui/2.8.1/layui.js"></script>

<script>
    layui.use('element', function () {
        var element = layui.element;

        //获取hash来切换选项卡，假设当前地址的hash为lay-id对应的值
        var layid = location.hash.replace(/^#test1=/, '');
        element.tabChange('test1', layid); //假设当前地址为：http://a.com#test1=222，那么选项卡会自动切换到“发送消息”这一项

        //监听Tab切换，以改变地址hash值
        element.on('tab(test1)', function () {
            location.hash = 'test1=' + this.getAttribute('lay-id');
        });
    });


    layui.use(function () {
        var upload = layui.upload;
        // 渲染  1.图像分类：
        upload.render({
            elem: '#uploadDemoChoose',
            url: '/baseadmin/upload/imgclassfication', // 此处配置你自己的上传接口即可
            auto: false,
            accept: 'file',
            multiple: true,
            exts: 'zip',
            data: {
                username: function () {
                    return $('#username').val();
                },
                password: function () {
                    return $('#password').val();
                },
                api: function () {
                    return $('#api').val();
                },
                reImgClassficationName: function () {
                    return $('#reImgClassficationName').val();
                }
            },
            bindAction: '#uploadvideo',
            done: function (res) {
                if(res.code ===0){
                    layer.msg(res.message)
                }
            }
        });

        //目标检测
        upload.render({
            elem: '#choose-detection',
            url: '/baseadmin/upload/detection', // 此处配置你自己的上传接口即可
            auto: false,
            accept: 'file',
            multiple: true,
            exts: 'zip',
            data: {
                username: function () {
                    return $('#username').val();
                },
                password: function () {
                    return $('#password').val();
                },
                api: function () {
                    return $('#api').val();
                },
                reDetectionName: function () {
                    return $('#reDetectionName').val();
                }
            },
            bindAction: '#upload-detection',
            done: function (res) {
                if(res.code ===0){
                    layer.msg(res.message)
                }
            }
        });


        //文本-情感
        upload.render({
            elem: '#choose-chineseattack',
            url: '/baseadmin/upload/chineseattackName', // 此处配置你自己的上传接口即可
            auto: false,
            accept: 'file',
            multiple: true,
            exts: 'zip',
            data: {
                username: function () {
                    return $('#username').val();
                },
                password: function () {
                    return $('#password').val();
                },
                api: function () {
                    return $('#api').val();
                },
                reChinese_attackName: function () {
                    return $('#reChinese_attackName').val();
                }
            },
            bindAction: '#upload-chineseattack',
            done: function (res) {
                if(res.code ===0){
                    layer.msg(res.message)
                }
            }
        });


        //文本-识别
        upload.render({
            elem: '#choose-seqattack',
            url: '/baseadmin/upload/reseqattackName', // 此处配置你自己的上传接口即可
            auto: false,
            accept: 'file',
            multiple: true,
            exts: 'zip',
            data: {
                username: function () {
                    return $('#username').val();
                },
                password: function () {
                    return $('#password').val();
                },
                api: function () {
                    return $('#api').val();
                },
                reSeq_AttackName: function () {
                    return $('#reSeq_AttackName').val();
                }
            },
            bindAction: '#upload-seqattack',
            done: function (res) {
                if(res.code ===0){
                    layer.msg(res.message)
                }
            }
        });

        //语音
        upload.render({
            elem: '#choose-voice',
            url: '/baseadmin/upload/voice', // 此处配置你自己的上传接口即可
            auto: false,
            accept: 'file',
            multiple: true,
            exts: 'zip',
            data: {
                username: function () {
                    return $('#username').val();
                },
                password: function () {
                    return $('#password').val();
                },
                api: function () {
                    return $('#api').val();
                },
                reVoiceName: function () {
                    return $('#reVoiceName').val();
                }
            },
            bindAction: '#upload-voice',
            done: function (res) {
                if(res.code ===0){
                    layer.msg(res.message)
                }
            }
        });

        //目标跟踪
        upload.render({
            elem: '#choose-trackdown',
            url: '/baseadmin/upload/trackdown', // 此处配置你自己的上传接口即可
            auto: false,
            accept: 'file',
            multiple: true,
            exts: 'zip',
            data: {
                username: function () {
                    return $('#username').val();
                },
                password: function () {
                    return $('#password').val();
                },
                api: function () {
                    return $('#api').val();
                },
                reTrackdownName: function () {
                    return $('#reTrackdownName').val();
                }
            },
            bindAction: '#upload-trackdown',
            done: function (res) {
                if(res.code ===0){
                    layer.msg(res.message)
                }
               // layer.msg('上传成功');
               // console.log(res)
            }
        });





    });


</script>
